name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PKG: "@interledger-aligned/http-message-signatures"

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm --filter "$PKG" typecheck

      - name: Validate RFC 9421 fixtures
        run: pnpm --filter "$PKG" validate:fixtures

      - name: Run test suite
        run: pnpm --filter "$PKG" test

      - name: Build (dual ESM + CJS)
        run: pnpm --filter "$PKG" build

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce coverage thresholds (>= 95% line/function, >= 90% branch over src/)
        run: pnpm --filter "$PKG" test:coverage:check
